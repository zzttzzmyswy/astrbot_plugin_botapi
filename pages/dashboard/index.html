<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotAPI 管理面板</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="stats-row">
      <div class="stat-card"><span class="stat-value" id="total-accounts">-</span><span class="stat-label">总账户</span></div>
      <div class="stat-card online"><span class="stat-value" id="online-count">-</span><span class="stat-label">在线</span></div>
      <div class="stat-card"><span class="stat-value" id="total-messages">-</span><span class="stat-label">总消息数</span></div>
    </div>
    <div class="toolbar">
      <button id="btn-add" class="btn btn-primary">+ 新增账户</button>
      <button id="btn-refresh" class="btn btn-secondary">刷新</button>
    </div>
    <div class="table-container">
      <table>
        <thead><tr><th>昵称</th><th>Token</th><th>ID(hash)</th><th>状态</th><th>消息</th><th>SSE</th><th>最后活跃</th><th>操作</th></tr></thead>
        <tbody id="account-list"><tr class="empty-row"><td colspan="8">加载中...</td></tr></tbody>
      </table>
    </div>

    <!-- 新增账户 -->
    <div id="modal-add" class="modal hidden">
      <div class="modal-content">
        <h3>新增 BotAPI 账户</h3>
        <label>昵称/备注（可选，便于区分）:<input type="text" id="input-nickname" placeholder="如：张三的Bot" /></label>
        <label>Token（留空自动生成）:<input type="text" id="input-token" /></label>
        <div class="modal-actions">
          <button id="btn-create" class="btn btn-primary">创建</button>
          <button id="btn-cancel" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 改名（替代 prompt，sandbox 无 allow-modals） -->
    <div id="modal-nickname" class="modal hidden">
      <div class="modal-content">
        <h3>设置昵称/备注</h3>
        <label>昵称（留空清除）:<input type="text" id="input-nick-new" /></label>
        <div class="modal-actions">
          <button id="btn-nick-save" class="btn btn-primary">保存</button>
          <button id="btn-nick-cancel" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 删除确认（替代 confirm） -->
    <div id="modal-confirm" class="modal hidden">
      <div class="modal-content">
        <h3>请确认</h3>
        <p id="confirm-msg" class="confirm-msg"></p>
        <div class="modal-actions">
          <button id="btn-confirm-ok" class="btn btn-danger">确认</button>
          <button id="btn-confirm-cancel" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 导出对话记录 -->
    <div id="modal-export" class="modal hidden">
      <div class="modal-content">
        <h3>导出对话记录</h3>
        <p id="export-msg" class="confirm-msg">选择导出格式（完整历史，无条数上限）：</p>
        <div class="modal-actions">
          <button id="btn-export-md" class="btn btn-primary">Markdown</button>
          <button id="btn-export-json" class="btn btn-secondary">JSON</button>
          <button id="btn-export-cancel" class="btn btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 提示（替代 alert） -->
    <div id="toast" class="toast hidden"></div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
